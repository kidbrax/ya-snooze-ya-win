name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  changelog:
    name: Changelog updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was modified
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^CHANGELOG\.md$' || {
            echo "❌ CHANGELOG.md was not updated. Please document your changes before merging."
            exit 1
          }
          echo "✅ CHANGELOG.md was updated."

  version:
    name: Version label present
    runs-on: ubuntu-latest
    steps:
      - name: Check for semver label
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          echo "Labels: $LABELS"
          echo "$LABELS" | grep -qE '"(major|minor|patch)"' || {
            echo "❌ PR must have a semver label: 'major', 'minor', or 'patch'."
            exit 1
          }
          echo "✅ Semver label found."
