name: Release & Publish

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Bump version, build, and cut GitHub release ───────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.version.outputs.version }}
      zip_name: ${{ steps.zip.outputs.zip_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Detect if this commit is already tagged (re-run case) ─────────────
      - name: Check for existing release tag
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [ -n "$EXISTING_TAG" ]; then
            echo "⚠️ Commit already tagged as $EXISTING_TAG — skipping version bump."
            echo "version=${EXISTING_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Determine bump type from the merged PR label ──────────────────────
      - name: Get merged PR labels
        id: pr_labels
        if: steps.existing.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --state merged --base main --json number,mergeCommit \
            --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number" | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found for this commit — defaulting to patch bump."
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")')
            echo "PR #$PR_NUMBER labels: $LABELS"

            if echo "$LABELS" | grep -q "major"; then
              echo "bump=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q "minor"; then
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            else
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Bump version in manifest.json and package.json ────────────────────
      - name: Bump version
        id: bumped
        if: steps.existing.outputs.skip == 'false'
        run: |
          BUMP=${{ steps.pr_labels.outputs.bump }}
          CURRENT=$(node -p "require('./public/manifest.json').version")
          echo "Current version: $CURRENT, bump: $BUMP"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('./public/manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('./public/manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

          npm version "$NEW_VERSION" --no-git-tag-version

      # ── Update CHANGELOG [Unreleased] → versioned entry ──────────────────
      - name: Stamp CHANGELOG
        if: steps.existing.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.bumped.outputs.version }}
          DATE=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

      # ── Update WhatsNewDialog with latest changelog items ────────────────
      - name: Update WhatsNewDialog
        if: steps.existing.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.bumped.outputs.version }}
          # Extract items for this version from CHANGELOG
          ITEMS=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found && /^- /{print}" CHANGELOG.md)

          # Build JSON array of items
          JSON_ITEMS=$(echo "$ITEMS" | sed 's/^- //' | node -e "
            let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{
              const items = d.trim().split('\n').filter(Boolean);
              console.log(JSON.stringify(items, null, 2));
            })
          ")

          # Replace CHANGELOG_ITEMS in WhatsNewDialog.jsx
          node -e "
            const fs = require('fs');
            const file = 'src/components/dialogs/WhatsNewDialog.jsx';
            let content = fs.readFileSync(file, 'utf8');
            const items = ${JSON_ITEMS};
            const itemsStr = items.map(i => \`  '\${i}',\`).join('\n');
            content = content.replace(
              /const CHANGELOG_ITEMS = \[[\s\S]*?\]/,
              'const CHANGELOG_ITEMS = [\n' + itemsStr + '\n]'
            );
            fs.writeFileSync(file, content);
          "

      # ── Commit, tag, push ─────────────────────────────────────────────────
      - name: Commit and tag
        if: steps.existing.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.bumped.outputs.version }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/manifest.json package.json package-lock.json CHANGELOG.md src/components/dialogs/WhatsNewDialog.jsx
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin main --follow-tags

      # ── Resolve version for remaining steps ───────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [ "${{ steps.existing.outputs.skip }}" = "true" ]; then
            echo "version=${{ steps.existing.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.bumped.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      # ── Zip the build ─────────────────────────────────────────────────────
      - name: Zip build
        id: zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ZIP_NAME="extension_v${VERSION}.zip"
          mkdir -p dist
          cd build && zip -r "../dist/${ZIP_NAME}" . && cd ..
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      # ── Upload zip as artifact for the publish job ────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/${{ steps.zip.outputs.zip_name }}
          retention-days: 7

      # ── GitHub Release (skipped on re-run if release already exists) ─────
      - name: Create GitHub Release
        if: steps.existing.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          gh release create "v$VERSION" \
            "dist/${{ steps.zip.outputs.zip_name }}" \
            --title "v$VERSION" \
            --notes "$NOTES" \
            --target main

  # ── Job 2: Publish to Chrome Web Store ───────────────────────────────────
  publish:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: release
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Download the zip built by the release job ─────────────────────────
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: dist

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          AUTO_PUBLISH: 'true' # auto-submit to Chrome store for review after upload
        run: |
          set -e
          ZIP_PATH="dist/${{ needs.release.outputs.zip_name }}"

          echo "▶ Getting OAuth access token..."
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).access_token))")

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Failed to get access token"
            exit 1
          fi
          echo "✅ Got access token"

          echo "▶ Uploading zip to Chrome Web Store..."
          UPLOAD_RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP_PATH")
          echo "Upload response: $UPLOAD_RESPONSE"

          UPLOAD_STATE=$(echo "$UPLOAD_RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ try { const r=JSON.parse(d); console.log(r.uploadState||r.error?.message||'UNKNOWN'); } catch(e){ console.log('PARSE_ERROR'); } })")

          if [ "$UPLOAD_STATE" != "SUCCESS" ]; then
            echo "❌ Upload failed with state: $UPLOAD_STATE"
            echo "ℹ️ If a previous version is still in review, wait for it to be approved then re-run the 'publish' job."
            exit 1
          fi
          echo "✅ Upload successful"

          if [ "$AUTO_PUBLISH" = "true" ]; then
            echo "▶ Submitting for review..."
            PUBLISH_RESPONSE=$(curl -s -X POST \
              "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "x-goog-api-version: 2" \
              -H "Content-Length: 0")
            echo "Publish response: $PUBLISH_RESPONSE"

            PUBLISH_STATUS=$(echo "$PUBLISH_RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ try { const r=JSON.parse(d); console.log(r.status?.[0]||r.error?.message||'UNKNOWN'); } catch(e){ console.log('PARSE_ERROR'); } })")

            if [ "$PUBLISH_STATUS" != "OK" ]; then
              echo "❌ Publish failed with status: $PUBLISH_STATUS"
              exit 1
            fi
            echo "✅ Submitted for review"
          else
            echo "ℹ️ AUTO_PUBLISH=false — skipping publish step (upload only)"
          fi
