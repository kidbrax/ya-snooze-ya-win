name: Release & Publish

on:
  push:
    branches: [main]

jobs:
  release:
    name: Bump version, tag, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Determine bump type from the merged PR label ──────────────────────
      - name: Get merged PR labels
        id: pr_labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR that was just merged into this commit
          PR_NUMBER=$(gh pr list --state merged --base main --json number,mergeCommit \
            --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number" | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found for this commit — defaulting to patch bump."
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")')
            echo "PR #$PR_NUMBER labels: $LABELS"

            if echo "$LABELS" | grep -q "major"; then
              echo "bump=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q "minor"; then
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            else
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Bump version in manifest.json and package.json ────────────────────
      - name: Bump version
        id: bump
        run: |
          BUMP=${{ steps.pr_labels.outputs.bump }}
          CURRENT=$(node -p "require('./public/manifest.json').version")
          echo "Current version: $CURRENT, bump: $BUMP"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update manifest.json
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('./public/manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('./public/manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

          # Update package.json
          npm version "$NEW_VERSION" --no-git-tag-version

      # ── Update CHANGELOG [Unreleased] → versioned entry ──────────────────
      - name: Stamp CHANGELOG
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          DATE=$(date +%Y-%m-%d)
          # Replace "## [Unreleased]" with versioned heading and add new Unreleased section
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

      # ── Commit, tag, push ─────────────────────────────────────────────────
      - name: Commit and tag
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/manifest.json package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin main --follow-tags

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      # ── Zip the build ─────────────────────────────────────────────────────
      - name: Zip build
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          mkdir -p dist
          cd build && zip -r "../dist/extension_v${VERSION}.zip" . && cd ..
          echo "zip_path=dist/extension_v${VERSION}.zip" >> "$GITHUB_ENV"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          # Extract this version's section from CHANGELOG for release notes
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          gh release create "v$VERSION" \
            "${{ env.zip_path }}" \
            --title "v$VERSION" \
            --notes "$NOTES" \
            --fail-on-no-commits \
            --generate-notes \
            --target main

      # ── Publish to Chrome Web Store ───────────────────────────────────────
      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          AUTO_PUBLISH: 'true' # auto-submit to Chrome store for review after upload
        run: |
          set -e
          ZIP_PATH="${{ env.zip_path }}"

          echo "▶ Getting OAuth access token..."
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")
          echo "Token response: $TOKEN_RESPONSE"
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).access_token))")

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Failed to get access token"
            exit 1
          fi
          echo "✅ Got access token"

          echo "▶ Uploading zip to Chrome Web Store..."
          UPLOAD_RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP_PATH")
          echo "Upload response: $UPLOAD_RESPONSE"

          UPLOAD_STATE=$(echo "$UPLOAD_RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ try { const r=JSON.parse(d); console.log(r.uploadState||r.error?.message||'UNKNOWN'); } catch(e){ console.log('PARSE_ERROR'); } })")

          if [ "$UPLOAD_STATE" != "SUCCESS" ]; then
            echo "❌ Upload failed with state: $UPLOAD_STATE"
            exit 1
          fi
          echo "✅ Upload successful"

          if [ "$AUTO_PUBLISH" = "true" ]; then
            echo "▶ Submitting for review..."
            PUBLISH_RESPONSE=$(curl -s -X POST \
              "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "x-goog-api-version: 2" \
              -H "Content-Length: 0")
            echo "Publish response: $PUBLISH_RESPONSE"

            PUBLISH_STATUS=$(echo "$PUBLISH_RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ try { const r=JSON.parse(d); console.log(r.status?.[0]||r.error?.message||'UNKNOWN'); } catch(e){ console.log('PARSE_ERROR'); } })")

            if [ "$PUBLISH_STATUS" != "OK" ]; then
              echo "❌ Publish failed with status: $PUBLISH_STATUS"
              exit 1
            fi
            echo "✅ Submitted for review"
          else
            echo "ℹ️ AUTO_PUBLISH=false — skipping publish step (upload only)"
          fi
